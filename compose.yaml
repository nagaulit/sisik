services:
    postgres:
        image: postgres:18
        restart: "always"
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: sisik
        volumes:
            - postgres-data:/var/lib/postgresql

    minio:
        image: minio/minio:latest
        restart: unless-stopped
        command: server /data --console-address ":9001"
        ports:
            - "9000:9000" # S3 API
            - "9001:9001" # Web Console
        environment:
            MINIO_ROOT_USER: minio
            MINIO_ROOT_PASSWORD: password
        volumes:
            - minio-data:/data

    mailpit:
        image: axllent/mailpit:latest
        restart: unless-stopped
        ports:
            - "1025:1025" # SMTP
            - "8025:8025" # Web UI

    redis:
        image: redis:8-alpine
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data

volumes:
    data:
    postgres-data:
    minio-data:
    redis-data:
    # node_modules:
